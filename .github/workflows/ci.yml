name: JustBB CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock_key"
          SUPABASE_SERVICE_ROLE_KEY: "mock_key"
          ADMIN_PASSWORD: "mock_password"

      - name: Test
        run: npm run test
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock_key"
          SUPABASE_SERVICE_ROLE_KEY: "mock_key"
          ADMIN_PASSWORD: "mock_password"

      - name: Check CLI package
        run: npm run check:cli
        env:
          NEXT_PUBLIC_SUPABASE_URL: "http://localhost:54321"
          NEXT_PUBLIC_SUPABASE_ANON_KEY: "mock_key"
          SUPABASE_SERVICE_ROLE_KEY: "mock_key"
          ADMIN_PASSWORD: "mock_password"
