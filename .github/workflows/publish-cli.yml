name: Publish JustMemo CLI

on:
  push:
    tags:
      - "cli-v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify CLI package
        run: npm run check:cli

      - name: Verify release tag
        run: |
          package_version="$(node -p \"require('./cli/package.json').version\")"
          tag_version="${GITHUB_REF_NAME#cli-v}"
          test "$tag_version" = "$package_version"

      - name: Publish to npm
        working-directory: cli
        run: npm publish
